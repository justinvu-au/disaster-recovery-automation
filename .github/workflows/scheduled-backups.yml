name: Scheduled Backups

on:
  schedule:
    - cron: "0 16 * * *"  # 16:00 UTC daily ≈ 2-3am AEST/AEDT
  workflow_dispatch: {}

jobs:
  backup-secrets:
    name: Backup Key Vault secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run secrets backup
        run: |
          chmod +x scripts/backup-secrets.sh
          ./scripts/backup-secrets.sh plstats-kv